<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:url("background.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
color:white;
text-align:center;
padding:40px 20px;
}

/* PROFILE */

.profile img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid white;
margin-bottom:10px;
}

h1{
font-size:26px;
margin-bottom:5px;
}

.bio{
opacity:0.9;
margin-bottom:35px;
}

/* LINK LIST */

.links{
max-width:420px;
margin:auto;
}

.link{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
background:white;
color:#333;
padding:15px;
margin:12px 0;
border-radius:10px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.link:hover{
transform:scale(1.05);
background:#f3f3f3;
}

/* SOCIAL MEDIA */

.social{
margin-top:40px;
}

.social a{
display:inline-block;
margin:0 8px;
font-size:22px;
color:white;
width:45px;
height:45px;
line-height:45px;
border-radius:50%;
background:rgba(255,255,255,0.2);
transition:0.3s;
}

.social a:hover{
background:white;
color:#333;
transform:scale(1.1);
}

/* FOOTER */

.footer{
margin-top:20px;
font-size:13px;
opacity:0.8;
}

/* COUNTER */

.counter{
margin-top:20px;
background:rgba(255,255,255,0.2);
display:inline-block;
padding:8px 15px;
border-radius:20px;
font-size:14px;
backdrop-filter:blur(5px);
}

</style>
</head>

<body>
